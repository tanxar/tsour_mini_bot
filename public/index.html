<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tsour TON Mini App – TON Connect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #020617;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: rgba(15, 23, 42, 0.96);
        border-radius: 18px;
        padding: 24px 20px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        text-align: center;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 8px;
        background: linear-gradient(135deg, #22d3ee, #a855f7);
        -webkit-background-clip: text;
        color: transparent;
      }
      p {
        margin: 0 0 16px;
        color: #9ca3af;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 14px 18px;
        border-radius: 999px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #22c55e, #3b82f6);
        color: #0b1120;
        box-shadow: 0 12px 30px rgba(56, 189, 248, 0.4);
      }
      #walletAddress {
        margin-top: 14px;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 13px;
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- TonConnect UI από CDN: εμφανίζει το επίσημο popup "Connect Wallet" με όλα τα wallets -->
    <script src="https://unpkg.com/@tonconnect/ui@2.0.8/dist/tonconnect-ui.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Tsour Mini App v2</h1>
      <p>Πάτα το κουμπί για να ανοίξεις το TON Connect popup και να διαλέξεις wallet.</p>
      <button id="letsGoBtn">🔗 Σύνδεση TON Wallet</button>
      <p id="walletAddress"></p>
    </div>

    <script>
      // Telegram WebApp integration
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const btn = document.getElementById('letsGoBtn');
      const addrEl = document.getElementById('walletAddress');

      // TonConnect UI instance – ΔΕΝ ανοίγει κατευθείαν πορτοφόλι, δείχνει popup με όλα τα wallets
      const TonConnectUI = window.TonConnectUI;
      let tonConnectUI = null;

      if (TonConnectUI) {
        tonConnectUI = new TonConnectUI({
          manifestUrl: 'https://tsour-mini-bot.vercel.app/tonconnect-manifest.json',
        });
      }

      // Όταν ο χρήστης πατάει το κουμπί, ανοίγει το επίσημο TON Connect popup
      btn.onclick = async () => {
        addrEl.innerText = 'Το κουμπί πατήθηκε. Προσπάθεια ανοίγματος TON Connect popup...';

        try {
          if (!tonConnectUI || typeof tonConnectUI.openModal !== 'function') {
            const msg = 'TonConnect UI δεν φορτώθηκε σωστά (tonConnectUI undefined).';
            addrEl.innerText = msg;
            console.error(msg, { TonConnectUI, tonConnectUI });
            return;
          }

          await tonConnectUI.openModal();
          addrEl.innerText = 'Το TON Connect popup ζητήθηκε. Αν δεν το βλέπεις, το μπλοκάρει το περιβάλλον (Telegram/webview).';
        } catch (e) {
          console.error('Σφάλμα στο TON Connect:', e);
          addrEl.innerText = 'Έγινε σφάλμα στο TON Connect: ' + (e && e.message ? e.message : String(e));
        }
      };
    </script>
  </body>
</html>
