<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>My TON Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #020617;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: rgba(15, 23, 42, 0.96);
        border-radius: 18px;
        padding: 24px 20px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        text-align: center;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        color: #9ca3af;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 14px 18px;
        border-radius: 999px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #22d3ee, #3b82f6);
        color: #0b1120;
        box-shadow: 0 12px 30px rgba(56, 189, 248, 0.4);
      }
      #walletAddress {
        margin-top: 14px;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 13px;
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonconnect/sdk/dist/tonconnect.min.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>My Mini App</h1>
      <p>Πάτα το κουμπί για να συνδεθείς με Tonkeeper και να δεις το wallet address σου.</p>
      <button id="letsGoBtn">Let's Go!</button>
      <p id="walletAddress">Wallet Address: Not connected</p>
    </div>

    <script>
      // Telegram WebApp integration
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      // TonConnect SDK από το CDN
      const { TonConnect } = window.TonConnectSDK;
      const tonConnect = new TonConnect({ bridgeUrl: 'https://bridge.tonapi.io' });

      const btn = document.getElementById('letsGoBtn');
      const addrEl = document.getElementById('walletAddress');

      btn.onclick = async () => {
        try {
          btn.disabled = true;
          addrEl.innerText = 'Connecting...';

          await tonConnect.connect();

          const address = tonConnect.account?.address;
          if (address) {
            addrEl.innerText = 'Wallet Address: ' + address;
            if (tg && tg.HapticFeedback) {
              tg.HapticFeedback.impactOccurred('medium');
            }
          } else {
            addrEl.innerText = 'Connected αλλά δεν βρέθηκε διεύθυνση.';
          }
        } catch (e) {
          console.error(e);
          addrEl.innerText = 'Η σύνδεση ακυρώθηκε ή απέτυχε.';
        } finally {
          btn.disabled = false;
        }
      };
    </script>
  </body>
</html>
