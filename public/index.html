<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TON Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #020617;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: rgba(15, 23, 42, 0.96);
        border-radius: 18px;
        padding: 24px 20px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        color: #9ca3af;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 14px 18px;
        border-radius: 999px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #22d3ee, #3b82f6);
        color: #0b1120;
        box-shadow: 0 12px 30px rgba(56, 189, 248, 0.4);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
        box-shadow: none;
      }
      .address {
        margin-top: 14px;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        font-size: 13px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }
      .status {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 8px;
      }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.8/dist/tonconnect-ui.min.js"></script>
    <script src="./main.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>TON Mini App</h1>
      <p>Πάτα το κουμπί για να συνδεθείς με Tonkeeper και να δεις το public wallet address σου.</p>
      <button id="connect-btn">Let's go</button>
      <div id="address" class="address" style="display:none;"></div>
      <div id="status" class="status"></div>
    </div>
  </body>
</html>
